      // Returns Promise<Blob>. The PNG is tightly cropped, padded, white, and rendered at 2x.
      window.exportBand = async function exportBand(index) {
        const band = bands[index];
        if (!band) throw new RangeError(`Band ${index} does not exist`);

        const points = band.strokes.flat();
        let left = 0, top = 0, right = band.canvas.width, bottom = BAND_HEIGHT;
        if (points.length) {
          const halfWidth = BASE_WIDTH;
          left = Math.min(...points.map(p => p.x)) - halfWidth - EXPORT_PADDING;
          top = Math.min(...points.map(p => p.y)) - halfWidth - EXPORT_PADDING;
          right = Math.max(...points.map(p => p.x)) + halfWidth + EXPORT_PADDING;
          bottom = Math.max(...points.map(p => p.y)) + halfWidth + EXPORT_PADDING;
        }

        const width = Math.max(1, Math.ceil(right - left));
        const height = Math.max(1, Math.ceil(bottom - top));
        const canvas = document.createElement('canvas');
        canvas.width = width * EXPORT_SCALE;
        canvas.height = height * EXPORT_SCALE;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        band.strokes.forEach(stroke => drawStroke(ctx, stroke, EXPORT_SCALE, left, top));

        return new Promise((resolve, reject) => canvas.toBlob(
          blob => blob ? resolve(blob) : reject(new Error('PNG export failed')),
          'image/png'
        ));
      };

      function setTool(nextTool) {
        tool = nextTool;
        worksheet.classList.toggle('eraser-mode', tool === 'eraser');
        penButton.classList.toggle('active', tool === 'pen');
        eraserButton.classList.toggle('active', tool === 'eraser');
        penButton.setAttribute('aria-pressed', String(tool === 'pen'));
        eraserButton.setAttribute('aria-pressed', String(tool === 'eraser'));
      }

      penButton.addEventListener('click', () => setTool('pen'));
      eraserButton.addEventListener('click', () => setTool('eraser'));
      undoButton.addEventListener('click', () => {
        const band = bands[activeBandIndex];
        if (!band || !band.history.length) return;
        clearTimeout(commitTimer);
        if (band.verdict === false) {
          band.selfCorrectionCandidate = { from: band.latex };
        }
        band.strokes = band.history.pop();
        band.transcriptionVersion++;
        invalidateAffectedVerifications(activeBandIndex);
        band.revision++;
        syncBandDebugState(band);
        renderBand(band);
        schedulePersist();
        lastPenUpBand = activeBandIndex;
        scheduleCommit(activeBandIndex);
      });

      problemInput.addEventListener('input', updateProblemDraftState);
      problemInput.addEventListener('keydown', event => {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        applyProblemDraft();
      });
      problemApplyButton.addEventListener('click', applyProblemDraft);
      problemUploadButton.addEventListener('click', () => problemFileInput.click());
      problemFileInput.addEventListener('change', () => {
        const [file] = problemFileInput.files;
        if (file) extractProblemFromImage(file);
      });
      panelTabs.forEach(tab => {
        tab.addEventListener('click', () => showSidePanel(tab.dataset.panel));
      });
      oneMoreButton.addEventListener('click', generateSimilarProblem);
      receiptButton.addEventListener('click', openReceipt);
      receiptCloseButton.addEventListener('click', closeReceipt);
      window.addEventListener('keydown', event => {
        if (event.key === 'Escape' && !receiptView.hidden) closeReceipt();
      });

      askForm.addEventListener('submit', async event => {
        event.preventDefault();
        const studentMessage = askInput.value.trim();
        if (!studentMessage || tutorRequestsInFlight) return;
        askInput.value = '';

        try {
          const nudge = await fetchNudge({
            ...tutorContext(),
            nudgeHistory: [...allNudges],
            studentMessage
          });
          addNudgeCard(nudge);
        } catch (error) {
          console.warn('[student question] nudge unavailable', error);
        }
      });

      if (savedWorksheet) {
        restoreWorksheet(savedWorksheet);
        console.log(`[persistence] restored ${bands.length} bands without API calls`);
      } else {
        for (let i = 0; i < 8; i++) createBand();
        if (restoredProblem !== null) schedulePersist();
      }
      updateGraphFromWorkspace();
      setSolvedState(worksheetIsSolved());

      resizeObserver = new ResizeObserver(entries => {
        for (const entry of entries) {
          const band = bands.find(candidate => candidate.canvas === entry.target);
          if (band) sizeCanvas(band);
        }
      });
      bands.forEach(band => resizeObserver.observe(band.canvas));

      window.addEventListener('resize', () => bands.forEach(sizeCanvas));
      window.addEventListener('pagehide', persistWorksheet);
    })();
  </script>
</body>
</html>
